# =============================================================================
# unzip-from-comment.yml
#
# Triggered by an issue or PR comment starting with "unzip".
#
# Fixes in this version:
#   - Removed invalid trim() call from job-level if condition.
#   - Moved comment body parsing entirely into a bash step (safer, no injection).
#   - Uses a file-based approach for comment body to avoid YAML quoting issues.
#   - RUN_LABEL is now passed as a single argument to the shell script.
#
# Comment format:
#   unzip https://example.com/archive.zip
#   unzip https://example.com/movie.part1.rar https://example.com/movie.part2.rar
#
# Branch protection note:
#   Results are pushed to unzip-results/* branches using GITHUB_TOKEN.
#   If branch protection rules block bot pushes, store a PAT as
#   ACTIONS_PAT secret and replace secrets.GITHUB_TOKEN with
#   secrets.ACTIONS_PAT in the checkout and push steps.
# =============================================================================

name: Unzip from Comment

on:
  issue_comment:
    types: [created]

jobs:
  unzip:
    # Run only when comment body starts with 'unzip' (any casing).
    # We avoid trim() which is not a valid GitHub Actions expression function.
    if: >
      startsWith(github.event.comment.body, 'unzip') ||
      startsWith(github.event.comment.body, 'Unzip') ||
      startsWith(github.event.comment.body, 'UNZIP') ||
      startsWith(github.event.comment.body, 'UNZIP') ||
      startsWith(github.event.comment.body, ' unzip') ||
      startsWith(github.event.comment.body, ' Unzip') ||
      startsWith(github.event.comment.body, ' UNZIP')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # ── 1. React immediately so the user knows the workflow started ────────
      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: context.payload.comment.id,
              content:    'rocket'
            });

      # ── 2. Checkout full history so we can create a new branch ────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 3. Install all required tools ─────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            aria2 \
            unrar \
            p7zip-full \
            unzip \
            tar \
            curl \
            wget

      # ── 4. Write comment body to a temp file and parse URLs ───────────────
      # We write to a file first to avoid any shell quoting / injection issues
      # when the comment contains special characters, backticks, or quotes.
      - name: Parse URLs from comment
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -Eeuo pipefail

          # Write comment body to a temp file
          printf '%s' "$COMMENT_BODY" > /tmp/comment_body.txt

          # Strip leading 'unzip' keyword (case-insensitive) and normalise whitespace
          URLS_RAW=$(sed -E 's/^[[:space:]]*[Uu][Nn][Zz][Ii][Pp][[:space:]]*//' /tmp/comment_body.txt \
            | tr -s '[:space:]' ' ' \
            | xargs)

          if [[ -z "$URLS_RAW" ]]; then
            echo "[ERROR] No URLs found in comment. Aborting."
            exit 1
          fi

          echo "Parsed URLs: $URLS_RAW"
          echo "urls=$URLS_RAW" >> "$GITHUB_OUTPUT"

      # ── 5. Create a dedicated result branch ───────────────────────────────
      - name: Create result branch
        id: branch
        run: |
          set -Eeuo pipefail
          ISSUE_NUM="${{ github.event.issue.number }}"
          RUN_ID="${{ github.run_id }}"
          BRANCH_NAME="unzip-results/issue${ISSUE_NUM}-run${RUN_ID}"
          git checkout -b "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "run_label=issue${ISSUE_NUM}-run${RUN_ID}" >> "$GITHUB_OUTPUT"

      # ── 6. Make helper script executable ──────────────────────────────────
      - name: Prepare script
        run: chmod +x scripts/unzip_from_comment.sh

      # ── 7. Download, validate, extract, and split ─────────────────────────
      - name: Download, extract, and split
        run: |
          set -Eeuo pipefail
          RUN_LABEL="${{ steps.branch.outputs.run_label }}"

          # Convert space-separated URL string to an array safely
          IFS=' ' read -ra URL_ARRAY <<< "${{ steps.parse.outputs.urls }}"

          bash scripts/unzip_from_comment.sh \
            "$RUN_LABEL" \
            "${URL_ARRAY[@]}"

      # ── 8. Commit and push to the result branch ───────────────────────────
      - name: Commit and push to result branch
        id: commit
        run: |
          set -Eeuo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RUN_LABEL="${{ steps.branch.outputs.run_label }}"

          git add "folder/${RUN_LABEL}/" "extracted/${RUN_LABEL}/" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(unzip): results for ${RUN_LABEL}"
            git push origin "${{ steps.branch.outputs.branch_name }}"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 9. Build a file summary for the success comment ───────────────────
      - name: Build file summary
        id: summary
        if: steps.commit.outputs.committed == 'true'
        run: |
          set -Eeuo pipefail
          RUN_LABEL="${{ steps.branch.outputs.run_label }}"

          DL_COUNT=$(find "folder/${RUN_LABEL}" -type f 2>/dev/null | wc -l | xargs)
          EX_COUNT=$(find "extracted/${RUN_LABEL}" -type f 2>/dev/null | wc -l | xargs)
          SPLIT_COUNT=$(find "extracted/${RUN_LABEL}" -type f -name '*.part_*' 2>/dev/null | wc -l | xargs)

          FILE_LIST=$(find "extracted/${RUN_LABEL}" -type f 2>/dev/null | sort | head -20 \
            | sed "s|extracted/${RUN_LABEL}/||" \
            | awk '{print "- `" $0 "`"}')

          {
            echo 'summary<<EOFSUM'
            echo "**Downloads:** ${DL_COUNT} file(s) in \`folder/${RUN_LABEL}/\`"
            echo "**Extracted:** ${EX_COUNT} file(s) in \`extracted/${RUN_LABEL}/\`"
            echo "**Split parts created:** ${SPLIT_COUNT}"
            echo ""
            echo "<details><summary>Extracted file list</summary>"
            echo ""
            echo "${FILE_LIST}"
            echo "</details>"
            echo 'EOFSUM'
          } >> "$GITHUB_OUTPUT"

      # ── 10. Post success comment ───────────────────────────────────────────
      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.summary.outputs.summary }}
        with:
          script: |
            const branch    = '${{ steps.branch.outputs.branch_name }}';
            const committed = '${{ steps.commit.outputs.committed }}';
            const summary   = process.env.SUMMARY || '';
            const repoUrl   = `${{ github.server_url }}/${{ github.repository }}`;
            const branchUrl = `${repoUrl}/tree/${branch}`;
            const runUrl    = `${repoUrl}/actions/runs/${{ github.run_id }}`;

            const body = committed === 'true'
              ? `\u2705 **Unzip complete!**\n\nResults committed to branch [\`${branch}\`](${branchUrl}).\n\n${summary}\n\n[View Actions log](${runUrl})`
              : `\u2705 **Unzip ran but nothing new was committed.**\n\n[View Actions log](${runUrl})`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });

      # ── 11. Post failure comment ──────────────────────────────────────────
      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `\u274C **Unzip failed!** Please check the [Actions log](${runUrl}) for details.`
            });
