# =============================================================================
# unzip-from-comment.yml
#
# Two trigger modes:
#   1. issue_comment  — comment "unzip <url1> [url2] ..." on any issue/PR
#   2. workflow_dispatch — run manually from the Actions tab with a URLs input
#
# Comment format:
#   unzip https://example.com/archive.zip
#   unzip https://example.com/movie.part1.rar https://example.com/movie.part2.rar
#
# Manual dispatch:
#   Go to Actions → "Unzip from Comment" → Run workflow
#   Fill in the "urls" field with space-separated URLs.
# =============================================================================

name: Unzip from Comment

on:
  issue_comment:
    types: [created]

  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated archive URLs to download and extract'
        required: true
        type: string

jobs:
  unzip:
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.comment.body, 'unzip') ||
      startsWith(github.event.comment.body, 'Unzip') ||
      startsWith(github.event.comment.body, 'UNZIP') ||
      startsWith(github.event.comment.body, ' unzip') ||
      startsWith(github.event.comment.body, ' Unzip') ||
      startsWith(github.event.comment.body, ' UNZIP')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      # ── 1. React to comment (issue_comment only) ─────────────────────────────
      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: context.payload.comment.id,
              content:    'rocket'
            });

      # ── 2. Checkout ─────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y aria2 unrar p7zip-full unzip tar curl wget

      # ── 4. Parse URLs ──────────────────────────────────────────────────────────────
      - name: Parse URLs
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          DISPATCH_URLS: ${{ inputs.urls }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -Eeuo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            URLS_RAW=$(printf '%s' "$DISPATCH_URLS" | tr -s '[:space:]' ' ' | xargs)
          else
            printf '%s' "$COMMENT_BODY" > /tmp/comment_body.txt
            URLS_RAW=$(sed -E 's/^[[:space:]]*[Uu][Nn][Zz][Ii][Pp][[:space:]]*//' /tmp/comment_body.txt \
              | tr -s '[:space:]' ' ' | xargs)
          fi
          if [[ -z "$URLS_RAW" ]]; then
            echo "[ERROR] No URLs found. Aborting."
            exit 1
          fi
          echo "Parsed URLs: $URLS_RAW"
          echo "urls=$URLS_RAW" >> "$GITHUB_OUTPUT"

      # ── 5. Create result branch ───────────────────────────────────────────────
      - name: Create result branch
        id: branch
        run: |
          set -Eeuo pipefail
          RUN_ID="${{ github.run_id }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            LABEL="manual-run${RUN_ID}"
          else
            ISSUE_NUM="${{ github.event.issue.number }}"
            LABEL="issue${ISSUE_NUM}-run${RUN_ID}"
          fi
          BRANCH_NAME="unzip-results/${LABEL}"
          # Create local branch; if remote already exists, delete it first
          git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "run_label=$LABEL" >> "$GITHUB_OUTPUT"

      # ── 6. Prepare script ──────────────────────────────────────────────────────────
      - name: Prepare script
        run: chmod +x scripts/unzip_from_comment.sh

      # ── 7. Download, extract, split ──────────────────────────────────────────────
      - name: Download, extract, and split
        run: |
          set -Eeuo pipefail
          RUN_LABEL="${{ steps.branch.outputs.run_label }}"
          IFS=' ' read -ra URL_ARRAY <<< "${{ steps.parse.outputs.urls }}"
          bash scripts/unzip_from_comment.sh "$RUN_LABEL" "${URL_ARRAY[@]}"

      # ── 8. Commit and push (force) ─────────────────────────────────────────────
      - name: Commit and push to result branch
        id: commit
        run: |
          set -Eeuo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RUN_LABEL="${{ steps.branch.outputs.run_label }}"
          git add "folder/${RUN_LABEL}/" "extracted/${RUN_LABEL}/" 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore(unzip): results for ${RUN_LABEL}"
            # --force handles re-runs where the remote branch already exists
            git push --force origin "${{ steps.branch.outputs.branch_name }}"
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # ── 9. Build file summary ──────────────────────────────────────────────────
      - name: Build file summary
        id: summary
        if: steps.commit.outputs.committed == 'true'
        run: |
          set -Eeuo pipefail
          RUN_LABEL="${{ steps.branch.outputs.run_label }}"
          DL_COUNT=$(find "folder/${RUN_LABEL}" -type f 2>/dev/null | wc -l | xargs)
          EX_COUNT=$(find "extracted/${RUN_LABEL}" -type f 2>/dev/null | wc -l | xargs)
          SPLIT_COUNT=$(find "extracted/${RUN_LABEL}" -type f -name '*.part_*' 2>/dev/null | wc -l | xargs)
          FILE_LIST=$(find "extracted/${RUN_LABEL}" -type f 2>/dev/null | sort | head -20 \
            | sed "s|extracted/${RUN_LABEL}/||" \
            | awk '{print "- `" $0 "`"}')
          {
            echo 'summary<<EOFSUM'
            echo "**Downloads:** ${DL_COUNT} file(s) in \`folder/${RUN_LABEL}/\`"
            echo "**Extracted:** ${EX_COUNT} file(s) in \`extracted/${RUN_LABEL}/\`"
            echo "**Split parts created:** ${SPLIT_COUNT}"
            echo ""
            echo "<details><summary>Extracted file list</summary>"
            echo ""
            echo "${FILE_LIST}"
            echo "</details>"
            echo 'EOFSUM'
          } >> "$GITHUB_OUTPUT"

      # ── 10. Success comment (issue_comment only) ───────────────────────────
      - name: Post success comment
        if: success() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.summary.outputs.summary }}
        with:
          script: |
            const branch    = '${{ steps.branch.outputs.branch_name }}';
            const committed = '${{ steps.commit.outputs.committed }}';
            const summary   = process.env.SUMMARY || '';
            const repoUrl   = `${{ github.server_url }}/${{ github.repository }}`;
            const branchUrl = `${repoUrl}/tree/${branch}`;
            const runUrl    = `${repoUrl}/actions/runs/${{ github.run_id }}`;
            const body = committed === 'true'
              ? `\u2705 **Unzip complete!**\n\nResults committed to branch [\`${branch}\`](${branchUrl}).\n\n${summary}\n\n[View Actions log](${runUrl})`
              : `\u2705 **Unzip ran but nothing new was committed.**\n\n[View Actions log](${runUrl})`;
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body
            });

      # ── 11. Dispatch summary log ─────────────────────────────────────────────────
      - name: Print dispatch summary
        if: success() && github.event_name == 'workflow_dispatch'
        run: |
          echo "===================================="
          echo " Unzip complete (manual dispatch)"
          echo "===================================="
          echo "Branch   : ${{ steps.branch.outputs.branch_name }}"
          echo "Label    : ${{ steps.branch.outputs.run_label }}"
          echo "Committed: ${{ steps.commit.outputs.committed }}"

      # ── 12. Failure comment (issue_comment only) ───────────────────────────
      - name: Post failure comment
        if: failure() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `\u274C **Unzip failed!** Please check the [Actions log](${runUrl}) for details.`
            });
